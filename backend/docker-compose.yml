# Env: ``env_file`` paths are relative to this file. Use ``backend/.env`` (or symlink
# it to ``../.env`` if you keep secrets at repo root). Extended ``env_file`` with
# ``required: false`` needs Compose v2.24+; v2.10 only accepts string paths—missing
# files make ``docker compose`` fail, so we list a single ``.env`` here.
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - ghost

  api:
    build: .
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - localstack
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude
      # Containers cannot use localhost for Redis on the host; override .env here.
      # Uncomment the redis service and set COMPOSE_REDIS_HOST=redis to use in-stack Redis.
      - REDIS_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/0
      - CELERY_BROKER_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/1
      - CELERY_RESULT_BACKEND=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/2
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_ACCESS_KEY_ID=test
      - S3_SECRET_ACCESS_KEY=test
      - S3_BUCKET_NAME=stemplitude-assets
      - ROBOTICS_COMPILER_URL=${ROBOTICS_COMPILER_URL:-}
      - ROBOTICS_COMPILER_TOKEN=${ROBOTICS_COMPILER_TOKEN:-}
      - ROBOTICS_COMPILER_TIMEOUT_SECONDS=${ROBOTICS_COMPILER_TIMEOUT_SECONDS:-45}
      - ROBOTICS_LOCAL_TOOLCHAIN_ENABLED=${ROBOTICS_LOCAL_TOOLCHAIN_ENABLED:-true}
      - ROBOTICS_LOCAL_TOOLCHAIN_FAIL_OPEN=${ROBOTICS_LOCAL_TOOLCHAIN_FAIL_OPEN:-true}
      - ROBOTICS_PROS_BIN=${ROBOTICS_PROS_BIN:-pros}
      - ROBOTICS_ARM_GCC_BIN_DIR=${ROBOTICS_ARM_GCC_BIN_DIR:-}

  celery_worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - localstack
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude
      - REDIS_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/0
      - CELERY_BROKER_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/1
      - CELERY_RESULT_BACKEND=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/2
      - S3_ENDPOINT_URL=http://localstack:4566
    healthcheck:
      test: ["CMD", "python", "scripts/celery_worker_healthcheck.py"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  celery_beat:
    build: .
    command: celery -A workers.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude
      - REDIS_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/0
      - CELERY_BROKER_URL=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/1
      - CELERY_RESULT_BACKEND=redis://${COMPOSE_REDIS_HOST:-host.docker.internal}:6379/2
    healthcheck:
      test: ["CMD", "python", "scripts/celery_beat_healthcheck.py"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  autoheal:
    image: willfarrell/autoheal
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: stem
      POSTGRES_PASSWORD: stem
      POSTGRES_DB: stemplitude

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

  # Optional robotics compiler service for production-like deploys.
  # Wire ROBOTICS_COMPILER_URL to this service when available, e.g.:
  # ROBOTICS_COMPILER_URL=http://robotics_compiler:8080/compile
  # robotics_compiler:
  #   image: your-org/vex-compiler:latest
  #   expose:
  #     - "8080"

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro

  migrate:
    build: .
    command: python -m app.manage db migrate
    depends_on:
      - db
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude

  seed:
    build: .
    command: python -m app.manage db seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude

  create-superadmin:
    build: .
    command: python -m app.manage users create-superadmin
    depends_on:
      seed:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stem:stem@db:5432/stemplitude

  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    ports:
      - "2368:2368"
    environment:
      - url=${GHOST_PUBLIC_URL:-http://blog.stemplitude.localhost}
      - NODE_ENV=production
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost.db
    volumes:
      - ghost_content:/var/lib/ghost/content

volumes:
  pgdata:
  localstack_data:
  ghost_content:
