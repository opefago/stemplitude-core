upstream api {
    server api:8000;
}

upstream ghost {
    server ghost:2368;
}

server {
    listen 80;
    server_name blog.stemplitude.localhost;

    client_max_body_size 50M;

    location / {
        proxy_pass http://ghost;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name *.stemplitude.localhost stemplitude.localhost;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api/health;
    }
}
