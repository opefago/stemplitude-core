        visible: true
        content:
          heading: What You'll Master
          items:
            - { title: Full-Stack Development, description: HTML, CSS, JavaScript, React, Node.js, and databases — the complete modern stack. }
            - { title: Real Projects, description: "Build 6+ portfolio projects including a capstone app, deployed and production-ready." }
            - { title: Career Support, description: Resume workshops, mock interviews, and direct introductions to hiring partners. }
            - { title: Mentorship, description: One-on-one guidance from senior developers working at top companies. }
      - type: cta
        visible: true
        content:
          heading: "Your Future Self Will Thank You"
          description: Applications are reviewed on a rolling basis. Scholarships available for underrepresented groups.
          button_text: Start Your Application
          button_link: /apply
          _bg:
            image_url: https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1400&h=500&fit=crop
            overlay: 0.7
          _styles:
            cta_btn: { backgroundColor: "#22c55e", color: "#ffffff", borderRadius: "8px", paddingV: "14px", paddingH: "36px" }

  - slug: tutoring-center
