            - { image_url: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&h=300&fit=crop", alt: Physics project, caption: Physics }
            - { image_url: "https://images.unsplash.com/photo-1530026405186-ed1f139313f8?w=400&h=300&fit=crop", alt: Biology microscopy, caption: Biology }
      - type: features
        visible: true
        content:
          heading: Lab Programs
          items:
            - { title: Chemistry Lab, description: "From molecular modeling to safe chemical reactions — real science, not just reading about it." }
            - { title: Physics Playground, description: "Build catapults, test circuits, and explore the laws of motion through engineering challenges." }
            - { title: Biology & Ecology, description: "Field studies, microscopy, and ecosystem projects that connect to the real world." }
            - { title: Earth & Space, description: "Rocketry, geology, and astronomy — explore everything from soil to the stars." }
      - type: stats
        visible: true
        content:
          heading: Discovery by the Numbers
          items:
            - { value: "5,000+", label: Experiments Run }
            - { value: "98%", label: Students Say "Fun" }
            - { value: "40+", label: Lab Modules }
            - { value: "6", label: Science Disciplines }
          _bg: { color: "#fef2f2" }
      - type: richText
        visible: true
        content:
          html: "<h2>The Science of Curiosity</h2><p>Every great discovery started with a simple question. Our programs are designed to nurture that spark — giving students the tools, the freedom, and the confidence to ask <em>\"what if?\"</em> and then go find out.</p><p>We don't teach science from a textbook. We teach it from a lab bench, a field notebook, and a telescope.</p>"

