          html: "<h2>Our Process</h2><p><strong>Ideate</strong> — Brainstorm solutions to real problems with guided design thinking workshops.</p><p><strong>Prototype</strong> — Turn ideas into working models using our fully-equipped maker spaces.</p><p><strong>Test &amp; Iterate</strong> — Gather feedback, analyze results, and refine your designs.</p><p><strong>Launch</strong> — Present your project at our annual showcase to industry judges and the community.</p>"
      - type: stats
        visible: true
        content:
          heading: Lab Activity
          items:
