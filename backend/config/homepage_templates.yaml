  # ── Professional ────────────────────────────────────

  - slug: corporate-academy
    name: Corporate Academy
    category: professional
    description: Authoritative dark theme for serious academies and training institutions.
    gradient: "linear-gradient(135deg, #0f172a, #1e3a5f)"
    sections:
      - type: hero
        visible: true
        content:
          title: Empowering the Next Generation of Leaders
          subtitle: World-class STEM education with industry-aligned curriculum and expert instructors.
          cta_text: Explore Programs
          cta_link: /programs
          _bg:
            image_url: https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=1400&h=600&fit=crop
            overlay: 0.55
          _styles:
            cta_btn: { backgroundColor: "#ffffff", color: "#0f172a", borderRadius: "8px", paddingV: "14px", paddingH: "32px" }
      - type: features
        visible: true
        content:
          heading: Why Choose Our Academy
          items:
            - { title: Expert Faculty, description: Learn from industry professionals with decades of real-world experience. }
            - { title: Hands-On Labs, description: State-of-the-art facilities with equipment used by top tech companies. }
            - { title: Career Pathways, description: Direct pipelines to internships and job placements at leading firms. }
            - { title: Certified Programs, description: Nationally recognized certifications that boost your credentials. }
      - type: stats
        visible: true
        content:
          heading: By the Numbers
          items:
            - { value: "2,500+", label: Students Enrolled }
            - { value: "95%", label: Completion Rate }
            - { value: "50+", label: Industry Partners }
            - { value: "12", label: Years of Excellence }
          _bg: { color: "#f1f5f9" }
      - type: testimonials
        visible: true
        content:
          heading: What Our Graduates Say
          items:
            - { quote: "This program completely transformed my career trajectory. The hands-on approach made all the difference.", author: Sarah Chen, role: Software Engineer }
            - { quote: "The instructors genuinely care about each student's success. I landed my dream job within two months of graduating.", author: Marcus Rivera, role: Data Scientist }
      - type: cta
        visible: true
        content:
          heading: Ready to Elevate Your Skills?
          description: Join thousands of successful graduates. Applications for the next cohort are now open.
          button_text: Apply Now
          button_link: /apply
          _bg:
            image_url: https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=1400&h=500&fit=crop
            overlay: 0.65
          _styles:
            cta_btn: { backgroundColor: "#3b82f6", color: "#ffffff", borderRadius: "8px", paddingV: "14px", paddingH: "36px" }

  - slug: university-hub
    name: University Hub
    category: professional
    description: Clean and trustworthy blue theme for educational institutions. Content-forward with no hard sell.
    gradient: "linear-gradient(135deg, #1e40af, #3b82f6)"
    sections:
      - type: hero
        visible: true
        content:
          title: Where Curiosity Meets Discovery
          subtitle: A premier learning environment fostering innovation, critical thinking, and academic excellence.
