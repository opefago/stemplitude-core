        visible: true
        content:
          html: "<h2>Our Mission</h2><p>We believe that education is the most powerful force for positive change. Our institution is dedicated to providing accessible, high-quality STEM education that equips learners with the knowledge, skills, and confidence to tackle the challenges of tomorrow.</p><p>Founded on principles of inclusivity and academic rigor, we strive to create an environment where every student can thrive.</p>"
      - type: stats
        visible: true
        content:
          heading: Our Impact
          items:
            - { value: "10,000+", label: Alumni Worldwide }
            - { value: "98%", label: Satisfaction Rate }
            - { value: "200+", label: Courses Available }
