        visible: true
        content:
          heading: Graduate Stories
          items:
            - { quote: "I went from barista to backend developer in four months. This bootcamp changed my life.", author: Jamie Okafor, role: Backend Developer at Stripe }
            - { quote: "The pace was intense but the support was incredible. I've never learned so much so fast.", author: Priya Sharma, role: Frontend Engineer at Shopify }
            - { quote: "Worth every penny and every late night. I tripled my salary within a year of graduating.", author: Carlos Mendez, role: Full-Stack Developer }
