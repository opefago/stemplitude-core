            - { image_url: "https://images.unsplash.com/photo-1562774053-701939374585?w=400&h=300&fit=crop", alt: Library study area, caption: Modern Library }
            - { image_url: "https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?w=400&h=300&fit=crop", alt: Science laboratory, caption: Research Labs }

  - slug: coding-bootcamp
