profiles:
  default:
    limit: 240
    window_seconds: 60
    description: Standard API request budget.
  strict_auth:
    limit: 40
    window_seconds: 60
    description: Login and auth flow protection.
  high_risk:
    limit: 25
    window_seconds: 60
    description: High-risk platform/admin mutation paths.
  relaxed:
    limit: 600
    window_seconds: 60
    description: Elevated allowance for trusted overrides.

endpoint_profiles:
  /api/v1/auth: strict_auth
  /api/v1/platform: high_risk
  /api/v1/realtime: strict_auth

high_risk_prefixes:
  - /api/v1/auth/login
  - /api/v1/auth/refresh
  - /api/v1/auth/onboard
  - /api/v1/platform

failure_modes:
  default: open
  high_risk: closed
