<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Forklift Base -->
  <rect x="8" y="40" width="32" height="16" rx="2" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Forklift Mast -->
  <rect x="12" y="16" width="6" height="24" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <rect x="30" y="16" width="6" height="24" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Forklift Forks -->
  <rect x="6" y="12" width="32" height="4" rx="1" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <rect x="6" y="20" width="32" height="3" rx="1" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  
  <!-- Fork Tines -->
  <rect x="4" y="8" width="4" height="12" rx="1" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <rect x="38" y="8" width="4" height="12" rx="1" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  
  <!-- Wheels -->
  <circle cx="16" cy="52" r="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <circle cx="32" cy="52" r="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <circle cx="16" cy="52" r="3" fill="#95a5a6"/>
  <circle cx="32" cy="52" r="3" fill="#95a5a6"/>
  
  <!-- Operator Compartment -->
  <rect x="20" y="28" width="16" height="12" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  
  <!-- Steering Wheel -->
  <circle cx="28" cy="32" r="2" fill="#34495e" stroke="#2c3e50" stroke-width="1"/>
  
  <!-- Hydraulic Cylinder -->
  <rect x="24" y="18" width="3" height="10" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  
  <!-- Load (Optional) -->
  <rect x="10" y="4" width="24" height="4" rx="1" fill="#f39c12" stroke="#e67e22" stroke-width="1" opacity="0.8"/>
</svg>