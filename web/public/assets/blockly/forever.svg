<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!-- Scratch-style forever block - taller with extended groove -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main forever block shape - Extended C-shape -->
  <g filter="url(#shadow)">
    <!-- Main block body -->
    <path d="
      M 6 12
      C 6 7, 10 4, 16 4
      L 48 4
      C 54 4, 58 7, 58 12
      L 58 30
      L 50 30
      L 50 32
      L 52 32
      L 52 48
      L 50 48
      L 50 50
      L 58 50
      L 58 68
      C 58 73, 54 76, 48 76
      L 16 76
      C 10 76, 6 73, 6 68
      Z
    " fill="#FF8C1A" stroke="#D67000" stroke-width="2.5"/>
    
    <!-- Inner groove - deeper and more extended -->
    <rect x="50" y="30" width="8" height="2" fill="#D67000"/>
    <rect x="50" y="48" width="8" height="2" fill="#D67000"/>
    <path d="
      M 50 32
      L 52 32
      L 52 48
      L 50 48
      Z
    " fill="#E68A00"/>
    
    <!-- Large circular arrows showing infinite loop -->
    <g transform="translate(28, 40)">
      <!-- Top-right curved arrow -->
      <path d="
        M 0 -14
        A 14 14 0 0 1 12 -7
        L 10 -4.5
        L 15 -7
        L 10 -9.5
        Z
      " fill="#FFF" opacity="0.95" stroke="#FFF" stroke-width="0.5"/>
      
      <!-- Bottom-left curved arrow -->
      <path d="
        M 0 14
        A 14 14 0 0 1 -12 7
        L -10 4.5
        L -15 7
        L -10 9.5
        Z
      " fill="#FFF" opacity="0.95" stroke="#FFF" stroke-width="0.5"/>
      
      <!-- Center circle to emphasize loop -->
      <circle cx="0" cy="0" r="3" fill="#FFF" opacity="0.7"/>
    </g>
  </g>
  
  <!-- "forever" text - larger and more readable -->
  <text x="32" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFF" opacity="0.95">forever</text>
  
  <!-- Small infinity symbol at bottom -->
  <g transform="translate(32, 62) scale(0.8)">
    <path d="
      M -6 0
      C -6 -3, -3 -5, 0 -3
      C 3 -5, 6 -3, 6 0
      C 6 3, 3 5, 0 3
      C -3 5, -6 3, -6 0
      Z
    " fill="#FFF" opacity="0.7" stroke="#FFF" stroke-width="0.5"/>
  </g>
</svg>

